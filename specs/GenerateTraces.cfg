\* TLC configuration for GenerateTraces.tla — happy-path model

SPECIFICATION Spec

\* ---------------------------------------------------------------------------
\* Model-value constants for Apalache outcomes
\* ---------------------------------------------------------------------------
CONSTANTS
  A_OK       = A_OK
  A_CEX      = A_CEX
  A_FAIL     = A_FAIL
  A_NOTFOUND = A_NOTFOUND

\* ---------------------------------------------------------------------------
\* Scenario: everything succeeds
\* ---------------------------------------------------------------------------
CONSTANTS
  SpecExists       = TRUE
  HasItfFiles      = TRUE
  UserOutDir       = FALSE
  KeepOutputs      = FALSE
  TempDirFailed    = FALSE
  TraceParseFailed = FALSE
  ApalacheTimeout  = FALSE
  ApalacheResult   = A_OK

INVARIANTS
  TypeInvariant
  TracesCollectedCorrect
  SpecNotFoundCorrect
  TempDirFailedCorrect
  ApalacheTimedOutCorrect
  NoTracesFoundCorrect
  TraceParseFailedCorrect

PROPERTIES
  Termination
  NoRecovery
